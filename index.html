<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DailyBite</title>

<style>
/* =========================
   GLOBAL THEME
========================= */

:root {
  --bg: #0B0F14;
  --panel: #111827;
  --card: #0F172A;
  --border: #1F2937;

  --text: #F8FAFC;
  --muted: #94A3B8;

  --green: #22C55E;
  --yellow: #FACC15;
  --red: #EF4444;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* =========================
   HEADER
========================= */

header {
  padding: 14px 14px 8px;
  border-bottom: 1px solid var(--border);
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title {
  font-size: 18px;
  font-weight: 700;
}

.subtitle {
  font-size: 11px;
  color: var(--muted);
  font-family: monospace;
  margin-top: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 999px;
}

.dot {
  width: 6px;
  height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

/* =========================
   LAYOUT
========================= */

.page {
  display: none;
  padding: 12px;
  padding-bottom: 90px;
}

.page.active {
  display: block;
}

/* =========================
   FILTER PILLS
========================= */

.filters {
  display: flex;
  overflow-x: auto;
  gap: 8px;
  padding: 8px 0;
}

.pill {
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  white-space: nowrap;
}

.pill.active {
  background: white;
  color: black;
}

/* =========================
   DEAL CARD
========================= */

.card {
  display: flex;
  gap: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 10px;
  position: relative;
}

.card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 10px;
  bottom: 10px;
  width: 3px;
  background: var(--green);
  border-radius: 3px;
}

/* SCORE RING */
.score {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 2px solid var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 14px;
  flex-shrink: 0;
}

/* CARD CONTENT */
.card-content {
  flex: 1;
}

.card-title {
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.card-desc {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

.meta {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  display: flex;
  gap: 6px;
  align-items: center;
}

.badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--muted);
}

.badge.green {
  border-color: var(--green);
  color: var(--green);
}

/* BUTTON */
.source-btn {
  margin-top: 10px;
  font-size: 12px;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: 10px;
  text-align: center;
  color: var(--text);
  text-decoration: none;
  display: block;
}

/* =========================
   CALENDAR
========================= */

.calendar-header {
  margin-bottom: 10px;
}

.calendar-header h3 {
  margin: 0;
}

.calendar-header small {
  color: var(--muted);
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px;
  text-align: center;
  min-height: 42px;
}

.day-num {
  font-size: 12px;
}

.dot-small {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin: 4px auto 0;
  background: var(--green);
}

/* MONTH LIST */
.month-list {
  margin-top: 12px;
}

.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
}

.circle {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

/* =========================
   NAV
========================= */

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: rgba(15, 23, 42, 0.9);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
}

.nav button {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 12px;
}

.nav button.active {
  color: var(--text);
  border-top: 2px solid var(--green);
}
</style>
</head>

<body>

<header>
  <div class="header-top">
    <div>←</div>
    <div class="title">DailyBite</div>
    <div>⚙️ ⋯</div>
  </div>

  <div class="subtitle">
    Food opportunity intelligence
    <div class="live-badge">
      <div class="dot"></div> LIVE
    </div>
  </div>
</header>

<!-- =========================
     DEALS
========================= -->
<div id="deals" class="page active">

  <div class="filters">
    <div class="pill active">All</div>
    <div class="pill">100</div>
    <div class="pill">90+</div>
    <div class="pill">70+</div>
    <div class="pill">Free Food</div>
  </div>

  <div id="dealList"></div>
</div>

<!-- =========================
     CALENDAR
========================= -->
<div id="calendar" class="page">

  <div class="calendar-header">
    <h3>Food Calendar</h3>
    <small>June 2026</small>
  </div>

  <div class="grid" id="calendarGrid"></div>

  <div class="month-list" id="monthList"></div>
</div>

<!-- =========================
     SETTINGS
========================= -->
<div id="settings" class="page">
  <div class="card-content">
    Settings Placeholder
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="nav('deals')" class="active">Deals</button>
  <button onclick="nav('calendar')">Calendar</button>
  <button onclick="nav('settings')">Settings</button>
</div>

<script>

let deals = [];
let foodDays = [];

/* LOAD DATA */
Promise.all([
  fetch('./deals.json').then(r => r.json()),
  fetch('./food_days.json').then(r => r.json())
]).then(([d,f]) => {
  deals = d;
  foodDays = f;

  renderDeals();
  renderCalendar();
  renderMonthList();
});

/* NAV */
function nav(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

/* DEALS */
function renderDeals(){
  const el = document.getElementById("dealList");

  el.innerHTML = deals.map(d => `
    <div class="card">

      <div class="score">${d.bite_score}</div>

      <div class="card-content">
        <div class="card-title">${d.title}</div>
        <div class="card-desc">${d.description}</div>

        <div class="meta">
          📍 ${d.location}
          ${d.verified ? `<span class="badge green">VERIFIED</span>` : `<span class="badge">UNVERIFIED</span>`}
        </div>

        <a class="source-btn" href="${d.source_url}" target="_blank">
          View Source →
        </a>
      </div>

    </div>
  `).join("");
}

/* CALENDAR GRID */
function renderCalendar(){

  const grid = document.getElementById("calendarGrid");

  let html = "";

  for(let i=1;i<=30;i++){

    const date = `2026-06-${String(i).padStart(2,'0')}`;
    const hasDeal = deals.find(d => d.event_start_date === date);

    html += `
      <div class="day">
        <div class="day-num">${i}</div>
        ${hasDeal ? `<div class="dot-small"></div>` : ""}
      </div>
    `;
  }

  grid.innerHTML = html;
}

/* MONTH LIST */
function renderMonthList(){

  const el = document.getElementById("monthList");

  el.innerHTML = foodDays.map(d => `
    <div class="row">
      <div class="circle">${new Date(d.date).getDate()}</div>
      <div>${d.title}</div>
      <div class="circle">●</div>
    </div>
  `).join("");
}

</script>

</body>
</html>
