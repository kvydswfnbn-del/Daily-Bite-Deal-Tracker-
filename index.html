<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DailyBite</title>

<style>
:root{
  --bg:#0B0F14;
  --card:#0F172A;
  --border:#1F2937;
  --text:#F8FAFC;
  --muted:#94A3B8;

  --green:#22C55E;
  --yellow:#F59E0B;
  --red:#EF4444;
  --gold1:#FDE68A;
  --gold2:#F59E0B;
  --blue:#3B82F6;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:12px;
  border-bottom:1px solid var(--border);
}

.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.small{
  color:var(--muted);
  font-size:12px;
}

.page{display:none;padding:12px;padding-bottom:90px;}
.page.active{display:block}

/* NAV */
.nav{
  position:fixed;bottom:0;width:100%;
  display:flex;
  background:#0f172acc;
  backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
}
.nav button{
  flex:1;padding:12px;
  background:none;border:none;
  color:var(--muted);
}
.nav button.active{
  color:white;
  border-top:2px solid var(--green);
}

/* DATE NAV */
.dateNav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  font-weight:600;
}

/* FILTERS */
.filters{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:8px 0;
}
.pill{
  padding:6px 10px;
  border:1px solid var(--border);
  border-radius:999px;
  color:var(--muted);
  font-size:12px;
}
.pill.active{
  background:white;
  color:black;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  display:flex;
  gap:12px;
  position:relative;
}

.card::before{
  content:"";
  width:3px;
  position:absolute;
  left:0;
  top:10px;
  bottom:10px;
  border-radius:3px;
}

.score{
  width:54px;height:54px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  border:2px solid var(--green);
}

/* CALENDAR */
.calendarHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  width:100%;
  aspect-ratio:1;
  border-radius:50%;
  background:var(--card);
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:12px;
}

.day.active{
  box-shadow:0 0 0 2px var(--blue);
}

.dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);
  margin-top:3px;
}

/* DETAIL */
.panel{
  margin-top:10px;
  padding:10px;
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--card);
}
</style>
</head>

<body>

<!-- ================= DEALS ================= -->
<div id="deals" class="page active">

<header>
  <div class="row">
    <div onclick="shiftDate(-1)">←</div>

    <div>
      <div id="currentDate"></div>
      <div class="small">Food opportunity intelligence</div>
    </div>

    <div onclick="shiftDate(1)">→</div>
  </div>
</header>

<div class="filters" id="filters"></div>

<div id="dealList"></div>
</div>

<!-- ================= CALENDAR ================= -->
<div id="calendar" class="page">

<div class="calendarHeader">
  <div onclick="shiftMonth(-1)">←</div>
  <div id="monthLabel"></div>
  <div onclick="shiftMonth(1)">→</div>
</div>

<div class="grid" id="calendarGrid"></div>

<div class="panel" id="dayPanel">
  Select a day
</div>

</div>

<!-- ================= SETTINGS ================= -->
<div id="settings" class="page">
Settings
</div>

<!-- NAV -->
<div class="nav">
  <button class="active" onclick="nav('deals')">Deals</button>
  <button onclick="nav('calendar')">Calendar</button>
  <button onclick="nav('settings')">Settings</button>
</div>

<script>

let deals = [];
let foodDays = [];

let selectedDate = new Date();
let selectedFilter = "All";
let selectedMonth = new Date();

const fmt = (d)=> d.toISOString().split("T")[0];

/* LOAD */
Promise.all([
  fetch('./deals.json').then(r=>r.json()),
  fetch('./food_days.json').then(r=>r.json())
]).then(([d,f])=>{
  deals=d;
  foodDays=f;

  renderFilters();
  renderDeals();
  renderCalendar();
});

/* NAV */
function nav(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

/* ================= DEALS ================= */

function shiftDate(dir){
  selectedDate.setDate(selectedDate.getDate()+dir);
  renderDeals();
}

function renderFilters(){
  const filters=["All","100","90+","70+","Free Food"];

  document.getElementById("filters").innerHTML =
    filters.map(f=>`
      <div class="pill ${f===selectedFilter?'active':''}"
      onclick="setFilter('${f}')">${f}</div>
    `).join("");
}

function setFilter(f){
  selectedFilter=f;
  renderFilters();
  renderDeals();
}

function scoreColor(s){
  if(s===100) return "linear-gradient(45deg,#FDE68A,#F59E0B)";
  if(s>=90) return "var(--green)";
  if(s>=70) return "var(--yellow)";
  return "var(--red)";
}

function renderDeals(){

  document.getElementById("currentDate").innerText =
    selectedDate.toDateString();

  let dateStr = fmt(selectedDate);

  let filtered = deals.filter(d=>d.event_start_date===dateStr);

  if(selectedFilter==="100") filtered=filtered.filter(d=>d.bite_score===100);
  if(selectedFilter==="90+") filtered=filtered.filter(d=>d.bite_score>=90);
  if(selectedFilter==="70+") filtered=filtered.filter(d=>d.bite_score>=70);

  // PIN 100s
  let pinned = filtered.filter(d=>d.bite_score===100);
  let rest = filtered.filter(d=>d.bite_score!==100)
    .sort((a,b)=>b.bite_score-a.bite_score);

  const all=[...pinned,...rest];

  document.getElementById("dealList").innerHTML =
  all.map(d=>`
    <div class="card">

      <div class="score"
      style="border-color:${scoreColor(d.bite_score)}">
        ${d.bite_score}
      </div>

      <div>
        <div style="font-weight:800">${d.title}</div>
        <div class="small">${d.description}</div>
        <div class="small">📍 ${d.location}</div>
      </div>

    </div>
  `).join("");
}

/* ================= CALENDAR ================= */

function shiftMonth(dir){
  selectedMonth.setMonth(selectedMonth.getMonth()+dir);
  renderCalendar();
}

function renderCalendar(){

  const m = selectedMonth.getMonth();
  const y = selectedMonth.getFullYear();

  document.getElementById("monthLabel").innerText =
    selectedMonth.toLocaleString('default',{month:'long',year:'numeric'});

  let days=new Date(y,m+1,0).getDate();

  let html="";

  for(let i=1;i<=days;i++){

    let dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    let has = deals.some(d=>d.event_start_date===dateStr);
    let isToday = fmt(new Date())===dateStr;

    html+=`
      <div class="day ${isToday?'active':''}"
      onclick="selectDay('${dateStr}')">
        ${i}
        ${has?'<div class="dot"></div>':''}
      </div>
    `;
  }

  document.getElementById("calendarGrid").innerHTML=html;
}

function selectDay(dateStr){

  let d = foodDays.find(x=>x.date===dateStr);

  let related = deals.filter(x=>x.event_start_date===dateStr);

  document.getElementById("dayPanel").innerHTML=`
    <div style="font-weight:800">${d?d.title:"No food holiday"}</div>
    <div class="small">${dateStr}</div>

    ${related.map(r=>`
      <div style="margin-top:8px">
        • ${r.title} (${r.bite_score})
      </div>
    `).join("")}
  `;
}

</script>

</body>
</html>
