<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DailyBite</title>

<style>
:root {
  --bg: #0D1117;
  --card: #161B22;
  --border: #30363D;
  --text: #E6EDF3;
  --muted: #8B949E;

  --gold: #FFD700;
  --green: #22C55E;
  --yellow: #FACC15;
  --red: #EF4444;
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  padding: 14px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
}

/* PAGES */
.page {
  display: none;
  padding: 12px;
  padding-bottom: 80px;
}

.page.active {
  display: block;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
}

.title {
  font-weight: 600;
}

.meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

/* SCORE */
.score {
  font-size: 26px;
  font-weight: 800;
}

.gold { color: #FFD700; }
.green { color: #22C55E; }
.yellow { color: #FACC15; }
.red { color: #EF4444; }

/* CALENDAR */
.day {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  cursor: pointer;
}

.hidden { display: none; }

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #0B0F14;
  border-top: 1px solid var(--border);
}

.nav button {
  flex: 1;
  padding: 14px;
  background: none;
  border: none;
  color: var(--muted);
}

.nav button.active {
  color: var(--text);
}
</style>
</head>

<body>

<header>DailyBite</header>

<!-- PAGE 1: TODAY -->
<div id="page-deals" class="page active">
  <h3>Today’s Deals</h3>
  <div id="todayDeals"></div>
</div>

<!-- PAGE 2: CALENDAR -->
<div id="page-calendar" class="page">
  <h3>Food Calendar</h3>
  <div id="calendar"></div>

  <div id="calendarDetail" style="margin-top:12px"></div>
</div>

<!-- PAGE 3: SETTINGS -->
<div id="page-settings" class="page">
  <h3>Settings</h3>
  <div class="card">
    Placeholder settings
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="go('deals')" class="active">Deals</button>
  <button onclick="go('calendar')">Calendar</button>
  <button onclick="go('settings')">Settings</button>
</div>

<script>

let deals = [];
let foodDays = [];

/* LOAD DATA */
Promise.all([
  fetch('./deals.json').then(r => r.json()),
  fetch('./food_days.json').then(r => r.json())
]).then(([d, f]) => {
  deals = d;
  foodDays = f;

  renderToday();
  renderCalendar();

  // default selected date = TODAY (June 5 test)
  selectDate("2026-06-05");
});

/* SCORE COLOR */
function color(score){
  if(score === 100) return "gold";
  if(score >= 90) return "green";
  if(score >= 70) return "yellow";
  return "red";
}

/* PAGE NAV */
function go(page){

  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));

  if(page === "deals"){
    document.getElementById("page-deals").classList.add("active");
    document.querySelectorAll(".nav button")[0].classList.add("active");
  }

  if(page === "calendar"){
    document.getElementById("page-calendar").classList.add("active");
    document.querySelectorAll(".nav button")[1].classList.add("active");
  }

  if(page === "settings"){
    document.getElementById("page-settings").classList.add("active");
    document.querySelectorAll(".nav button")[2].classList.add("active");
  }
}

/* PAGE 1: TODAY */
function renderToday(){

  const today = "2026-06-05";

  const todayDeals = deals.filter(d =>
    d.event_start_date === today
  );

  const container = document.getElementById("todayDeals");

  if(todayDeals.length === 0){
    container.innerHTML = `<div class="card">No deals today</div>`;
    return;
  }

  container.innerHTML = todayDeals
    .sort((a,b)=>b.bite_score-a.bite_score)
    .map(d => `
      <div class="card">
        <div class="${color(d.bite_score)} score">${d.bite_score}</div>
        <div class="title">${d.title}</div>
        <div class="meta">${d.description}</div>
      </div>
    `).join("");
}

/* PAGE 2: CALENDAR */
function renderCalendar(){

  const container = document.getElementById("calendar");

  container.innerHTML = foodDays.map(day => `
    <div class="day" onclick="selectDate('${day.date}')">
      <div style="font-weight:600">${day.title}</div>
      <div class="meta">${day.date}</div>
    </div>
  `).join("");
}

/* CALENDAR DETAIL VIEW */
function selectDate(date){

  const day = foodDays.find(d => d.date === date);

  const matchedDeals = deals.filter(d =>
    d.event_type === "food_holiday" &&
    d.event_start_date === date
  );

  const best = matchedDeals.length
    ? Math.max(...matchedDeals.map(d => d.bite_score))
    : null;

  const container = document.getElementById("calendarDetail");

  container.innerHTML = `
    <div class="card">
      <div style="font-weight:700">${day?.title || "Unknown Day"}</div>
      <div class="meta">${date}</div>
    </div>

    <h4>Deals</h4>

    ${
      matchedDeals.length === 0
        ? `<div class="card">No verified food holiday deals yet</div>`
        : matchedDeals.map(d => `
            <div class="card">
              <div class="${color(d.bite_score)} score">${d.bite_score}</div>
              <div class="title">${d.title}</div>
              <div class="meta">${d.description}</div>
            </div>
          `).join("")
    }
  `;
}

</script>

</body>
</html>
