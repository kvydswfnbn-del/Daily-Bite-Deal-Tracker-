<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DailyBite</title>

<style>
:root {
  --bg: #0D1117;
  --card: #161B22;
  --border: #30363D;
  --text: #E6EDF3;
  --muted: #8B949E;

  --gold: #FFD700;
  --green: #22C55E;
  --yellow: #FACC15;
  --red: #EF4444;
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  padding: 14px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
}

/* CONTAINER */
.container {
  padding: 12px;
  padding-bottom: 80px;
}

/* BEST BITE */
.best {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
}

.best-score {
  font-size: 28px;
  font-weight: 800;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
}

.score {
  font-size: 26px;
  font-weight: 800;
}

.title {
  font-weight: 600;
  margin-top: 4px;
}

.meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #0B0F14;
  border-top: 1px solid var(--border);
}

.nav button {
  flex: 1;
  padding: 14px;
  background: none;
  border: none;
  color: var(--muted);
}

.nav button.active {
  color: var(--text);
}

/* CALENDAR */
.day {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  cursor: pointer;
}

/* COLORS */
.gold { color: var(--gold); }
.green { color: var(--green); }
.yellow { color: var(--yellow); }
.red { color: var(--red); }

.hidden { display: none; }
</style>
</head>

<body>

<header>DailyBite</header>

<div class="container">

<!-- BEST BITE -->
<div id="bestBite" class="best"></div>

<!-- DEALS -->
<div id="dealsView"></div>

<!-- CALENDAR -->
<div id="calendarView" class="hidden"></div>

<!-- SETTINGS -->
<div id="settingsView" class="hidden">
  <div class="card">
    Notifications<br><br>
    100 Only<br>
    90+<br>
    All Deals
  </div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="switchTab('deals')" class="active">Deals</button>
  <button onclick="switchTab('calendar')">Calendar</button>
  <button onclick="switchTab('settings')">Settings</button>
</div>

<script>

let deals = [];

/* LOAD DATA */
fetch('./deals.json')
  .then(r => r.json())
  .then(data => {
    deals = data;
    renderDeals();
    renderCalendar();
  });

/* SCORE COLOR */
function color(score){
  if(score === 100) return "gold";
  if(score >= 90) return "green";
  if(score >= 70) return "yellow";
  return "red";
}

/* DEALS */
function renderDeals(){

  const sorted = [...deals].sort((a,b)=>b.bite_score-a.bite_score);
  const best = sorted[0];

  document.getElementById("bestBite").innerHTML = `
    <div class="${color(best.bite_score)} best-score">🥇 ${best.bite_score}</div>
    <div class="title">${best.title}</div>
    <div class="meta">${best.description}</div>
  `;

  document.getElementById("dealsView").innerHTML = sorted.map(d => `
    <div class="card">
      <div class="${color(d.bite_score)} score">${d.bite_score}</div>
      <div class="title">${d.title}</div>
      <div class="meta">${d.description}</div>
      <div class="meta">${d.location || ""}</div>
      <div class="meta">${d.verified ? "VERIFIED" : ""}</div>
    </div>
  `).join("");
}

/* CALENDAR */
function renderCalendar(){

  const grouped = {};

  deals.forEach(d=>{
    const date = d.event_start_date || "unknown";
    if(!grouped[date]) grouped[date]=[];
    grouped[date].push(d);
  });

  const container = document.getElementById("calendarView");

  container.innerHTML = Object.keys(grouped).sort().map(date=>{
    const items = grouped[date];
    const best = Math.max(...items.map(i=>i.bite_score));

    return `
      <div class="day" onclick="toggle('${date}')">
        <div style="display:flex;justify-content:space-between">
          <div>
            <div>${date}</div>
            <div style="font-size:12px;color:#8B949E">${items.length} deals</div>
          </div>
          <div class="${color(best)}" style="font-weight:800;font-size:20px">
            ${best}
          </div>
        </div>

        <div id="d-${date}" class="hidden" style="margin-top:10px">
          ${items.map(i=>`
            <div style="margin-top:8px;border-top:1px solid #30363D;padding-top:8px">
              <div style="font-weight:600">${i.title}</div>
              <div style="font-size:12px;color:#8B949E">${i.description}</div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }).join("");
}

function toggle(date){
  const el = document.getElementById("d-"+date);
  if(!el) return;
  el.classList.toggle("hidden");
}

/* NAV */
function switchTab(tab){

  document.getElementById("dealsView").classList.add("hidden");
  document.getElementById("calendarView").classList.add("hidden");
  document.getElementById("settingsView").classList.add("hidden");

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));

  if(tab==="deals"){
    document.getElementById("dealsView").classList.remove("hidden");
    document.querySelectorAll(".nav button")[0].classList.add("active");
  }

  if(tab==="calendar"){
    document.getElementById("calendarView").classList.remove("hidden");
    document.querySelectorAll(".nav button")[1].classList.add("active");
  }

  if(tab==="settings"){
    document.getElementById("settingsView").classList.remove("hidden");
    document.querySelectorAll(".nav button")[2].classList.add("active");
  }
}

</script>

</body>
</html>
